syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.patient_service.grpc";

service PatientGrpcService {
  // Verify patient existence and return status
  rpc VerifyPatientExists (PatientIdRequest) returns (PatientExistsResponse);
}

message PatientIdRequest {
  string patientId = 1;
}

message PatientExistsResponse {
  bool isValid = 1;
}
