spring.application.name=patient-service


spring.datasource.url=${PATIENT_DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}

billing.grpc.host=${BILLING_GRPC_HOST}
billing.grpc.port=${BILLING_GRPC_PORT}

doctor.grpc.host=${DOCTOR_GRPC_HOST:doctor-service}
doctor.grpc.port=${DOCTOR_GRPC_PORT:9002}


#redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

grpc.server.port=9005